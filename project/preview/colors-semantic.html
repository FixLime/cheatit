<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head><body>
<div class="card">
  <div class="eyebrow" style="margin-bottom:14px">Semantic colors</div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
    <div style="background:rgba(50,215,75,0.12);border:1px solid #32D74B33;border-radius:6px;padding:12px;display:flex;align-items:center;gap:10px">
      <div style="width:10px;height:10px;border-radius:999px;background:#32D74B;box-shadow:0 0 8px #32D74B"></div>
      <div><div style="font-weight:700;color:#32D74B;font-size:12px">SUCCESS</div><div style="font-family:var(--font-mono);font-size:10px;color:var(--fg-3)">#32D74B · win, ready, online</div></div>
    </div>
    <div style="background:rgba(255,69,58,0.12);border:1px solid #FF453A33;border-radius:6px;padding:12px;display:flex;align-items:center;gap:10px">
      <div style="width:10px;height:10px;border-radius:999px;background:#FF453A;box-shadow:0 0 8px #FF453A"></div>
      <div><div style="font-weight:700;color:#FF453A;font-size:12px">DANGER</div><div style="font-family:var(--font-mono);font-size:10px;color:var(--fg-3)">#FF453A · loss, kick, ban</div></div>
    </div>
    <div style="background:rgba(255,214,10,0.12);border:1px solid #FFD60A33;border-radius:6px;padding:12px;display:flex;align-items:center;gap:10px">
      <div style="width:10px;height:10px;border-radius:999px;background:#FFD60A;box-shadow:0 0 8px #FFD60A"></div>
      <div><div style="font-weight:700;color:#FFD60A;font-size:12px">WARNING</div><div style="font-family:var(--font-mono);font-size:10px;color:var(--fg-3)">#FFD60A · pending</div></div>
    </div>
    <div style="background:rgba(10,132,255,0.12);border:1px solid #0A84FF33;border-radius:6px;padding:12px;display:flex;align-items:center;gap:10px">
      <div style="width:10px;height:10px;border-radius:999px;background:#0A84FF;box-shadow:0 0 8px #0A84FF"></div>
      <div><div style="font-weight:700;color:#0A84FF;font-size:12px">INFO</div><div style="font-family:var(--font-mono);font-size:10px;color:var(--fg-3)">#0A84FF · info, premium</div></div>
    </div>
  </div>
</div>
</body></html>
