<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head><body>
<div class="card">
  <div class="eyebrow" style="margin-bottom:14px">Spacing scale — 4px base</div>
  <div style="display:flex;align-items:flex-end;gap:10px">
    <div style="text-align:center"><div style="width:4px;height:30px;background:#FF5500;margin:0 auto"></div><div style="font-family:var(--font-mono);font-size:10px;color:var(--fg-3);margin-top:6px">1<br/>4</div></div>
    <div style="text-align:center"><div style="width:8px;height:30px;background:#FF5500;margin:0 auto"></div><div style="font-family:var(--font-mono);font-size:10px;color:var(--fg-3);margin-top:6px">2<br/>8</div></div>
    <div style="text-align:center"><div style="width:12px;height:30px;background:#FF5500;margin:0 auto"></div><div style="font-family:var(--font-mono);font-size:10px;color:var(--fg-3);margin-top:6px">3<br/>12</div></div>
    <div style="text-align:center"><div style="width:16px;height:30px;background:#FF5500;margin:0 auto"></div><div style="font-family:var(--font-mono);font-size:10px;color:var(--fg-3);margin-top:6px">4<br/>16</div></div>
    <div style="text-align:center"><div style="width:20px;height:30px;background:#FF5500;margin:0 auto"></div><div style="font-family:var(--font-mono);font-size:10px;color:var(--fg-3);margin-top:6px">5<br/>20</div></div>
    <div style="text-align:center"><div style="width:24px;height:30px;background:#FF5500;margin:0 auto"></div><div style="font-family:var(--font-mono);font-size:10px;color:var(--fg-3);margin-top:6px">6<br/>24</div></div>
    <div style="text-align:center"><div style="width:32px;height:30px;background:#FF5500;margin:0 auto"></div><div style="font-family:var(--font-mono);font-size:10px;color:var(--fg-3);margin-top:6px">8<br/>32</div></div>
    <div style="text-align:center"><div style="width:40px;height:30px;background:#FF5500;margin:0 auto"></div><div style="font-family:var(--font-mono);font-size:10px;color:var(--fg-3);margin-top:6px">10<br/>40</div></div>
    <div style="text-align:center"><div style="width:48px;height:30px;background:#FF5500;margin:0 auto"></div><div style="font-family:var(--font-mono);font-size:10px;color:var(--fg-3);margin-top:6px">12<br/>48</div></div>
    <div style="text-align:center"><div style="width:64px;height:30px;background:#FF5500;margin:0 auto"></div><div style="font-family:var(--font-mono);font-size:10px;color:var(--fg-3);margin-top:6px">16<br/>64</div></div>
  </div>
  <div style="font-family:var(--font-mono);font-size:10px;color:var(--fg-3);margin-top:14px">token / px — card padding 16/24, section gap 32/48, inline rhythm 8/12</div>
</div>
</body></html>
