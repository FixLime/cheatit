<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head><body>
<div class="card">
  <div class="eyebrow" style="margin-bottom:14px">Stats & numerals — display, tabular</div>
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:14px">
    <div><div style="font-family:var(--font-display);font-size:36px;color:#FF5500;font-variant-numeric:tabular-nums">1842</div><div style="font-size:10px;color:var(--fg-3);text-transform:uppercase;letter-spacing:0.1em;margin-top:2px">ELO</div></div>
    <div><div style="font-family:var(--font-display);font-size:36px;color:#fff;font-variant-numeric:tabular-nums">1.42</div><div style="font-size:10px;color:var(--fg-3);text-transform:uppercase;letter-spacing:0.1em;margin-top:2px">K/D</div></div>
    <div><div style="font-family:var(--font-display);font-size:36px;color:#fff;font-variant-numeric:tabular-nums">63%</div><div style="font-size:10px;color:var(--fg-3);text-transform:uppercase;letter-spacing:0.1em;margin-top:2px">WIN RATE</div></div>
    <div><div style="font-family:var(--font-display);font-size:36px;color:#fff;font-variant-numeric:tabular-nums">38%</div><div style="font-size:10px;color:var(--fg-3);text-transform:uppercase;letter-spacing:0.1em;margin-top:2px">HS%</div></div>
  </div>
  <div style="font-family:var(--font-mono);font-size:10px;color:var(--fg-3);margin-top:14px">Russo One · tabular-nums · ALL CAPS labels +0.1em</div>
</div>
</body></html>
