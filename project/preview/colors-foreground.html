<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head><body>
<div class="card">
  <div class="eyebrow" style="margin-bottom:14px">Foreground — text on dark</div>
  <div style="background:#0D0D0F;border:1px solid var(--border-subtle);border-radius:6px;padding:18px">
    <div style="color:#FFFFFF;font-size:18px;font-weight:600;margin-bottom:6px">fg-1 — primary text <span style="font-family:var(--font-mono);font-size:11px;font-weight:400;color:#8a8a92">#FFFFFF</span></div>
    <div style="color:#C8C8CE;font-size:14px;margin-bottom:6px">fg-2 — secondary <span style="font-family:var(--font-mono);font-size:11px;color:#8a8a92">#C8C8CE</span></div>
    <div style="color:#8A8A92;font-size:13px;margin-bottom:6px">fg-3 — tertiary / muted meta <span style="font-family:var(--font-mono);font-size:11px">#8A8A92</span></div>
    <div style="color:#5A5A62;font-size:12px">fg-4 — disabled / placeholder <span style="font-family:var(--font-mono);font-size:11px">#5A5A62</span></div>
  </div>
</div>
</body></html>
