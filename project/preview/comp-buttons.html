<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head><body>
<div class="card">
  <div class="eyebrow" style="margin-bottom:14px">Buttons — primary / secondary / ghost</div>
  <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center">
    <button style="background:#FF5500;color:#fff;border:0;padding:10px 20px;border-radius:4px;font-family:var(--font-body);font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;cursor:pointer">Играть</button>
    <button style="background:#FF6A1F;color:#fff;border:0;padding:10px 20px;border-radius:4px;font-family:var(--font-body);font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;box-shadow:0 0 16px rgba(255,85,0,0.4)">Hover</button>
    <button style="background:#26262A;color:#fff;border:1px solid rgba(255,255,255,0.1);padding:10px 20px;border-radius:4px;font-family:var(--font-body);font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em">Готов</button>
    <button style="background:transparent;color:#C8C8CE;border:1px solid rgba(255,255,255,0.18);padding:10px 20px;border-radius:4px;font-family:var(--font-body);font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em">Отмена</button>
    <button style="background:transparent;color:#FF5500;border:0;padding:10px 12px;font-family:var(--font-body);font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em">Подробнее ›</button>
  </div>
  <div style="display:flex;gap:10px;margin-top:12px">
    <button style="background:#FF5500;color:#fff;border:0;padding:14px 28px;border-radius:4px;font-family:var(--font-display);font-size:18px;text-transform:uppercase;letter-spacing:0.04em;box-shadow:0 0 24px rgba(255,85,0,0.45);cursor:pointer">PLAY · CS2</button>
    <button style="background:#3A3A40;color:#5A5A62;border:0;padding:10px 20px;border-radius:4px;font-family:var(--font-body);font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em" disabled>Disabled</button>
  </div>
</div>
</body></html>
