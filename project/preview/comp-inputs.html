<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head><body>
<div class="card">
  <div class="eyebrow" style="margin-bottom:14px">Inputs & form fields</div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
    <div>
      <div style="font-size:10px;color:var(--fg-3);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:6px">EMAIL</div>
      <input value="player@cheatit.gg" style="width:100%;background:#26262A;border:1px solid rgba(255,255,255,0.1);color:#fff;padding:10px 12px;border-radius:4px;font-family:var(--font-body);font-size:14px;box-sizing:border-box"/>
    </div>
    <div>
      <div style="font-size:10px;color:var(--fg-3);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:6px">NICKNAME</div>
      <input value="hvh_god_2007" style="width:100%;background:#26262A;border:2px solid #FF5500;color:#fff;padding:9px 11px;border-radius:4px;font-family:var(--font-body);font-size:14px;box-sizing:border-box"/>
    </div>
    <div>
      <div style="font-size:10px;color:var(--fg-3);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:6px">PLACEHOLDER</div>
      <input placeholder="Введите промокод" style="width:100%;background:#26262A;border:1px solid rgba(255,255,255,0.1);color:#5A5A62;padding:10px 12px;border-radius:4px;font-family:var(--font-body);font-size:14px;box-sizing:border-box"/>
    </div>
    <div>
      <div style="font-size:10px;color:var(--fg-3);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:6px">ERROR</div>
      <input value="taken_nick" style="width:100%;background:#26262A;border:1px solid #FF453A;color:#fff;padding:10px 12px;border-radius:4px;font-family:var(--font-body);font-size:14px;box-sizing:border-box"/>
      <div style="font-size:11px;color:#FF453A;margin-top:4px">Никнейм занят</div>
    </div>
  </div>
</div>
</body></html>
