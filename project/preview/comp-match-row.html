<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head><body>
<div class="card">
  <div class="eyebrow" style="margin-bottom:14px">Match row — recent matches</div>
  <div style="background:#1C1C1F;border-radius:6px;border:1px solid var(--border-subtle);overflow:hidden">
    <div style="display:grid;grid-template-columns:auto 1fr auto auto auto;gap:14px;align-items:center;padding:12px 16px;border-left:3px solid #32D74B">
      <span style="color:#32D74B;font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:0.1em">WIN</span>
      <div><div style="color:#fff;font-size:13px;font-weight:600">de_mirage</div><div style="color:var(--fg-3);font-size:11px">2ч назад · NIXWARE</div></div>
      <div style="font-family:var(--font-display);color:#fff;font-size:18px;font-variant-numeric:tabular-nums">16:13</div>
      <div style="font-family:var(--font-mono);color:var(--fg-2);font-size:13px">28-19</div>
      <span style="color:#32D74B;font-family:var(--font-display);font-size:14px">+25</span>
    </div>
    <div style="display:grid;grid-template-columns:auto 1fr auto auto auto;gap:14px;align-items:center;padding:12px 16px;border-left:3px solid #FF453A;border-top:1px solid var(--border-subtle)">
      <span style="color:#FF453A;font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:0.1em">LOSS</span>
      <div><div style="color:#fff;font-size:13px;font-weight:600">de_inferno</div><div style="color:var(--fg-3);font-size:11px">5ч назад · NEVERLOSE</div></div>
      <div style="font-family:var(--font-display);color:#fff;font-size:18px;font-variant-numeric:tabular-nums">11:16</div>
      <div style="font-family:var(--font-mono);color:var(--fg-2);font-size:13px">15-22</div>
      <span style="color:#FF453A;font-family:var(--font-display);font-size:14px">−18</span>
    </div>
  </div>
</div>
</body></html>
