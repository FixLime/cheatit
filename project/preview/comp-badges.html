<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head><body>
<div class="card">
  <div class="eyebrow" style="margin-bottom:14px">Badges & chips</div>
  <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
    <span style="background:rgba(50,215,75,0.15);color:#32D74B;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;padding:4px 8px;border-radius:3px">LIVE</span>
    <span style="background:rgba(255,85,0,0.15);color:#FF5500;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;padding:4px 8px;border-radius:3px">PREMIUM</span>
    <span style="background:rgba(255,69,58,0.15);color:#FF453A;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;padding:4px 8px;border-radius:3px">BANNED</span>
    <span style="background:rgba(255,214,10,0.15);color:#FFD60A;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;padding:4px 8px;border-radius:3px">QUEUE</span>
    <span style="background:#26262A;color:#C8C8CE;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;padding:4px 8px;border-radius:3px">CS2</span>
    <span style="background:transparent;border:1px solid rgba(255,255,255,0.18);color:#C8C8CE;font-size:11px;padding:5px 12px;border-radius:999px;font-family:var(--font-mono)">NIXWARE</span>
    <span style="background:transparent;border:1px solid #FF5500;color:#FF5500;font-size:11px;padding:5px 12px;border-radius:999px;font-family:var(--font-mono)">NEVERLOSE ✓</span>
    <span style="background:transparent;border:1px solid rgba(255,255,255,0.18);color:#C8C8CE;font-size:11px;padding:5px 12px;border-radius:999px;font-family:var(--font-mono)">FATALITY</span>
  </div>
</div>
</body></html>
