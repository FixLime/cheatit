<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head><body>
<div class="card">
  <div class="eyebrow" style="margin-bottom:14px">Radii — tight, geometric</div>
  <div style="display:flex;gap:18px;align-items:flex-end">
    <div style="text-align:center"><div style="width:64px;height:64px;background:#1C1C1F;border:1px solid var(--border-default);border-radius:2px"></div><div style="font-family:var(--font-mono);font-size:10px;color:var(--fg-3);margin-top:8px">xs · 2</div></div>
    <div style="text-align:center"><div style="width:64px;height:64px;background:#1C1C1F;border:1px solid var(--border-default);border-radius:4px"></div><div style="font-family:var(--font-mono);font-size:10px;color:var(--fg-3);margin-top:8px">sm · 4 ★</div></div>
    <div style="text-align:center"><div style="width:64px;height:64px;background:#1C1C1F;border:1px solid var(--border-default);border-radius:6px"></div><div style="font-family:var(--font-mono);font-size:10px;color:var(--fg-3);margin-top:8px">md · 6</div></div>
    <div style="text-align:center"><div style="width:64px;height:64px;background:#1C1C1F;border:1px solid var(--border-default);border-radius:8px"></div><div style="font-family:var(--font-mono);font-size:10px;color:var(--fg-3);margin-top:8px">lg · 8</div></div>
    <div style="text-align:center"><div style="width:64px;height:64px;background:#1C1C1F;border:1px solid var(--border-default);border-radius:12px"></div><div style="font-family:var(--font-mono);font-size:10px;color:var(--fg-3);margin-top:8px">xl · 12</div></div>
    <div style="text-align:center"><div style="width:64px;height:32px;background:#1C1C1F;border:1px solid var(--border-default);border-radius:999px"></div><div style="font-family:var(--font-mono);font-size:10px;color:var(--fg-3);margin-top:8px">pill</div></div>
  </div>
  <div style="font-family:var(--font-mono);font-size:10px;color:var(--fg-3);margin-top:14px">★ default for buttons/inputs/badges · cards md/lg · pill for chips · avatars sm (never circle)</div>
</div>
</body></html>
