<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head><body>
<div class="card">
  <div class="eyebrow" style="margin-bottom:14px">Borders — hairline dividers</div>
  <div style="background:#1C1C1F;border-radius:6px;overflow:hidden">
    <div style="padding:14px 16px;border-bottom:1px solid rgba(255,255,255,0.06);display:flex;justify-content:space-between"><span style="color:#fff">subtle · 6%</span><span style="font-family:var(--font-mono);color:var(--fg-3);font-size:11px">rgba(255,255,255,0.06)</span></div>
    <div style="padding:14px 16px;border-bottom:1px solid rgba(255,255,255,0.10);display:flex;justify-content:space-between"><span style="color:#fff">default · 10%</span><span style="font-family:var(--font-mono);color:var(--fg-3);font-size:11px">rgba(255,255,255,0.10)</span></div>
    <div style="padding:14px 16px;border-bottom:1px solid rgba(255,255,255,0.18);display:flex;justify-content:space-between"><span style="color:#fff">strong · 18%</span><span style="font-family:var(--font-mono);color:var(--fg-3);font-size:11px">rgba(255,255,255,0.18)</span></div>
    <div style="padding:14px 16px;border:2px solid #FF5500;border-radius:6px;margin:8px;display:flex;justify-content:space-between"><span style="color:#fff">focus · brand</span><span style="font-family:var(--font-mono);color:var(--fg-3);font-size:11px">2px #FF5500</span></div>
  </div>
</div>
</body></html>
